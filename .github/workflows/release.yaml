name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  IMAGE_NAME: kite
  GO_VERSION: '1.25'
  NODE_VERSION: '24'
  GHCR_REPO: ghcr.io/${{ github.repository }}

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    outputs:
      tag_name: ${{ steps.check_version.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          check-latest: true

      - name: Install deps
        run: make deps

      - name: Check version
        id: check_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> "${GITHUB_OUTPUT}"

      - name: Build
        run: make cross-compile

      - name: Package binaries
        run: make package-binaries

      - name: Prepare image tags
        id: image_tags
        run: |
          TAG_NAME="${{ steps.check_version.outputs.tag_name }}"
          {
            echo "tags<<EOF"
            echo "${GHCR_REPO}:${TAG_NAME}"
            echo "${GHCR_REPO}:latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.binary
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.image_tags.outputs.tags }}
          labels: runnumber=${{ github.run_id }}

      - name: Package Helm chart
        run: helm package deploy/charts/kite/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_version.outputs.tag_name }}
          name: ${{ steps.check_version.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            bin/kite-*-${{ steps.check_version.outputs.tag_name }}.tar.gz
            kite-*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-sealos-images:
    name: Push Sealos Images
    runs-on: ubuntu-latest
    needs: push
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cache images tools
        run: sudo bash ./.github/scripts/install.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache images for sealos
        working-directory: deploy
        run: |
          set -euo pipefail
          TAG_NAME="${{ needs.push.outputs.tag_name }}"
          sudo sealos login -u "${{ github.repository_owner }}" -p "${{ secrets.GITHUB_TOKEN }}" ghcr.io
          sed -i "/^image:/,/^[^[:space:]]/ s#^\([[:space:]]*repository:[[:space:]]*\).*#\1${GHCR_REPO}#" charts/kite/values.yaml
          sed -i "/^image:/,/^[^[:space:]]/ s#^\([[:space:]]*tag:[[:space:]]*\).*#\1${TAG_NAME}#" charts/kite/values.yaml
          sudo sealos registry save --registry-dir=registry_amd64 --arch amd64 .
          sudo sealos registry save --registry-dir=registry_arm64 --arch arm64 .

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sealos image
        uses: docker/build-push-action@v6
        with:
          context: ./deploy
          file: ./deploy/Kubefile
          labels: runnumber=${{ github.run_id }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_REPO }}-cluster:${{ needs.push.outputs.tag_name }}
            ${{ env.GHCR_REPO }}-cluster:latest
